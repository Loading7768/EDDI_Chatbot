<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Form Flow</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <!-- Alpine.js Core -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        /* Custom scrollbar for inner card content if it overflows */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 4px;
        }

        /* Card 3 human body / organ interface styles */
        .image-section {
            margin-top: 15px;
            text-align: center;
        }
        .image-wrapper {
            position: relative;
            display: block;
            width: 100%;
            max-width: 495px;
            margin: 0 auto;
        }
        .image-container {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .image-container img {
            width: 100%;
            display: block;
            border-radius: 8px;
        }
        
        .interactive-layout {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            margin: 15px auto 0 auto;
            gap: 10px;
            width: 100%;
            max-width: 450px;
            position: relative;
            padding: 0 5px;
            box-sizing: border-box;
        }
        .body-column {
            flex: 0 0 126px;
            position: relative;
        }
        .popover-column {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 220px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            pointer-events: none;
            z-index: 100;
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .buttons-column {
            flex: 0 0 68px;
            position: relative;
        }
        
        .hotspot {
            position: absolute;
            border: 2px solid #10b981; /* emerald-500 */
            background-color: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s, border-width 0.2s;
            box-sizing: border-box;
            z-index: 5;
        }
        .hotspot:hover, .hotspot.active {
            background-color: rgba(16, 185, 129, 0.4);
            border-width: 3px;
            transform: scale(1.05);
            z-index: 10;
        }
        .hotspot.disabled {
            border-color: #475569 !important; /* slate-600 */
            background-color: rgba(71, 85, 105, 0.1) !important;
            color: #64748b !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
            animation: none !important;
        }
        .hotspot.disabled:hover {
            transform: none !important;
            background-color: rgba(71, 85, 105, 0.1) !important;
        }

        .bottom-btn {
            position: absolute !important;
            width: 100% !important;
            height: auto !important;
            padding: 6px 8px;
            border-radius: 21px;
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981; /* emerald-500 */
            font-weight: bold;
            font-size: 14px;
            border: 2px solid #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s, transform 0.2s;
        }
        .bottom-btn.disabled:hover {
            transform: translateY(-50%) !important;
            background-color: rgba(71, 85, 105, 0.1) !important;
            color: #64748b !important;
            border-color: #475569 !important;
        }
        
        .btn-skin {
            top: 25% !important;
            left: 0 !important;
            transform: translateY(-50%) !important;
        }
        .btn-mental {
            top: 50% !important;
            left: 0 !important;
            transform: translateY(-50%) !important;
        }
        .btn-other {
            top: 75% !important;
            left: 0 !important;
            transform: translateY(-50%) !important;
        }

        .btn-skin:hover, .btn-skin.active,
        .btn-mental:hover, .btn-mental.active,
        .btn-other:hover, .btn-other.active {
            background-color: #10b981; /* emerald-500 */
            color: white;
            border-width: 2px;
            transform: translateY(-50%) scale(1.05) !important;
        }

        #popover {
            position: absolute;
            left: 0;
            width: 220px;
            z-index: 100;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .popover-content {
            background: #0f172a; /* slate-900 */
            border: 1.5px solid #10b981; /* emerald-500 */
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            max-height: 320px;
            overflow: hidden;
        }

        #popover h4 {
            margin: 0;
            padding: 14px 16px 10px 16px;
            background-color: #0f172a;
            color: #10b981;
            font-size: 14px;
            border-bottom: 1px solid #1e293b; /* slate-800 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        #popover h4 .close-btn {
            cursor: pointer;
            font-size: 18px;
            color: #64748b; /* slate-500 */
            line-height: 1;
            padding: 0 2px;
            user-select: none;
        }
        #popover h4 .close-btn:hover { color: #cbd5e1; }

        .pop-checkbox-list {
            padding: 10px 16px 14px 16px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        #popover::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #0f172a;
            z-index: 2;
            border-left: 1.5px solid #10b981;
            border-top: 1.5px solid #10b981;
        }
        #popover.arrow-left::before {
            left: -7px;
            top: calc(var(--arrow-top, 18px) - 8.5px);
            transform: rotate(-45deg);
        }
        #popover.arrow-right::before {
            right: -7px;
            top: calc(var(--arrow-top, 18px) - 8.5px);
            transform: rotate(135deg);
        }

        @keyframes custom-glow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(16, 185, 129, 0.4);
                background-color: rgba(16, 185, 129, 0.1);
                border-color: rgba(16, 185, 129, 0.6);
            }
            50% {
                box-shadow: 0 0 15px rgba(16, 185, 129, 0.8);
                background-color: rgba(16, 185, 129, 0.3);
                border-color: rgba(16, 185, 129, 1);
            }
        }
        .pulse-glow {
            animation: custom-glow 2s infinite ease-in-out;
        }

        .pop-checkbox-item {
            display: flex;
            align-items: center;
            font-size: 15px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            color: #94a3b8; /* slate-400 */
            border: 1px solid transparent;
        }
        .pop-checkbox-item:hover {
            background: #1e293b;
            color: #f1f5f9;
        }
        .pop-checkbox-item.selected {
            background: rgba(16, 185, 129, 0.15); /* emerald-500/15 */
            color: #34d399; /* emerald-400 */
            border-color: rgba(16, 185, 129, 0.3);
            font-weight: 500;
            padding-left: 8px;
        }

        /* Chips styling for selected symptoms list at the bottom */
        .chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }
        .chip .icon {
            margin-right: 6px;
            font-weight: bold;
        }
        .chip.active {
            background-color: rgba(16, 185, 129, 0.2);
            color: #34d399; /* emerald-400 */
            border: 1px solid #10b981;
        }
        .chip.active:hover {
            background-color: rgba(16, 185, 129, 0.3);
        }
    </style>
    <script>
        window.doctorInfo = {{ doctor_info | tojson | safe if doctor_info else 'null' }};
        window.pairingInfo = {{ pairing_info | tojson | safe if pairing_info else 'null' }};
    </script>
</head>
<body class="bg-slate-950 text-white font-sans h-screen w-screen overflow-hidden m-0 relative">

    <div x-data="{ 
            active: 1, 
            doctorName: '',
            doctorDept: '',
            sessionLoaded: false,
            submitLoading: false,
            submitError: '',
            todayStr: '',
            loginSuccess: false,
            pairSuccess: false,
            lastActive: null,
            formData: {1: '', 2: '', 3: '', 4: '', 5: ''},
            translateY: 0,
            animFrame: null,
            
            // Login State
            loginAccount: '',
            loginPassword: '',
            loginLoading: false,
            loginError: '',
            showLoginSuccess: false,
            showLogoutConfirm: false,
            
            // Pairing State
            pairCodeStr: '',
            pairLoading: false,
            pairError: '',
            pairSelectError: '',
            showPairSuccess: false,
            showPairSelect: false,
            lineUname: '',
            lineUuid: '',
            relations: [],
            selectedRelation: null,
            draftInputs: {
                self: { type: 'self', relation: '帳號本人', mrc: '' },
                new: { type: 'new', relation: '', mrc: '' }
            },
            existingScrolled: false,
            
            // Card 3 State
            topicMapping: {
                '頭': ['頭暈', '流鼻血', '發燒', '頭痛', '偏頭痛', '噁心嘔吐', '眩暈'],
                '脖子': ['咳嗽', '咳血', '打嗝'],
                '手': [],
                '軀幹上半部': ['胸痛', '心悸', '呼吸急促/呼吸困難', '上背痛'],
                '軀幹下半部': ['腹痛', '腸胃炎/病毒性腸胃炎', '便秘', '腹瀉', '腰痛', '吐血、解黑便、解血便、胃腸道出血', '血尿', '下背痛', '尿滯留', '懷孕早期陰道出血', '懷孕後期陰道出血', '月經週期間陰道出血'],
                '腳': [],
                '皮膚': ['燒燙傷', '水腫', '皮膚疹子(皮疹)'],
                '精神': ['譫妄、意識混亂', '虛弱', '暈厥、暈倒'],
                '其他': ['高血壓', '肌肉、關節和骨骼疼痛', '癲癇', '休克', '一般外傷、鈍挫傷、扭傷、拉傷', '傷口處置原則']
            },
            selectedSymptoms: [],
            showPrefillMsg: false,
            activeRegion: null,
            popoverTop: 0,
            popoverLeft: 0,
            arrowTop: '18px',
            popoverArrowClass: 'arrow-left',

            toggleSymptom(topic) {
                const idx = this.selectedSymptoms.indexOf(topic);
                if (idx > -1) {
                    this.selectedSymptoms.splice(idx, 1);
                } else {
                    this.selectedSymptoms.push(topic);
                }
                this.showPrefillMsg = false;
            },
            
            showPopover(region, event, posType) {
                if (this.activeRegion === region) {
                    this.activeRegion = null;
                    return;
                }
                this.activeRegion = region;
                
                const hotspotEl = event.currentTarget;
                const layoutEl = document.getElementById('image-wrapper');
                if (!hotspotEl || !layoutEl) return;
                
                this.$nextTick(() => {
                    setTimeout(() => {
                        const popoverEl = document.getElementById('popover');
                        if (!popoverEl) return;
                        
                        const layoutRect = layoutEl.getBoundingClientRect();
                        const spotRect = hotspotEl.getBoundingClientRect();
                        const popoverRect = popoverEl.getBoundingClientRect();

                        const spotCenterY = (spotRect.top + spotRect.bottom) / 2 - layoutRect.top;

                        let top = spotCenterY - popoverRect.height / 2;
                        const maxTop = layoutRect.height - popoverRect.height - 15;
                        top = Math.max(0, Math.min(top, maxTop));
                        this.popoverTop = top;

                        let arrow = spotCenterY - top;
                        arrow = Math.max(20, Math.min(arrow, popoverRect.height - 20));
                        this.arrowTop = arrow + 'px';

                        let spotLeft = spotRect.left - layoutRect.left;
                        let spotRight = spotRect.right - layoutRect.left;

                        if (posType === 'body') {
                            this.popoverLeft = spotRight + 6;
                            this.popoverArrowClass = 'arrow-left';
                        } else {
                            this.popoverLeft = spotLeft - 226;
                            this.popoverArrowClass = 'arrow-right';
                        }
                    }, 50);
                });
            },
            
            async doSelectPatient() {
                if (!this.selectedRelation) return;
                this.pairSelectError = '';
                
                // If new, validate inputs
                if (this.selectedRelation.type === 'self' && !this.selectedRelation.mrc) return;
                if (this.selectedRelation.type === 'new' && (!this.selectedRelation.mrc || !this.selectedRelation.relation)) return;
                
                if (this.selectedRelation.type === 'self' || this.selectedRelation.type === 'new') {
                    const rel = this.selectedRelation.type === 'self' ? '帳號本人' : this.selectedRelation.relation.trim();
                    const mrc = this.selectedRelation.mrc.trim();
                    
                    if (this.selectedRelation.type === 'new' && (rel === '新增' || rel === '帳號本人')) {
                        this.pairSelectError = '稱呼和病歷號不可重複';
                        return;
                    }
                    
                    const isDup = this.relations.some(r => r.relation === rel || r.medical_record_num === mrc);
                    if (isDup) {
                        this.pairSelectError = '稱呼和病歷號不可重複';
                        return;
                    }
                }
                
                let text = '';
                let matchedRelationObj = null;
                if (this.selectedRelation.type.startsWith('existing')) {
                    const idx = parseInt(this.selectedRelation.type.split('_')[1]);
                    const sorted = [...this.relations].sort((a,b) => (a.relation === '帳號本人') ? -1 : (b.relation === '帳號本人') ? 1 : 0);
                    matchedRelationObj = sorted[idx];
                    text = this.selectedRelation.relation;
                } else if (this.selectedRelation.type === 'self') {
                    text = '帳號本人';
                } else {
                    text = this.selectedRelation.relation || '？？？';
                }
                
                // Prefill selection based on patient
                if (this.sessionLoaded) {
                    this.sessionLoaded = false;
                } else {
                    if (matchedRelationObj && matchedRelationObj.prefilled_symptoms && matchedRelationObj.prefilled_symptoms.length > 0) {
                        this.selectedSymptoms = [...matchedRelationObj.prefilled_symptoms];
                        this.showPrefillMsg = true;
                    } else {
                        this.selectedSymptoms = [];
                        this.showPrefillMsg = false;
                    }
                }
                
                this.formData[2] = `病患: ${text}`;
                this.active = 3;
            },
            
            async doDischarge() {
                if (this.selectedSymptoms.length < 1) return;
                
                try {
                    const res = await fetch('/api/form_discharge', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ symptoms: this.selectedSymptoms })
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.formData[3] = this.selectedSymptoms.join(', ');
                        this.active = 4;
                    }
                } catch(e) {
                    console.error('Error saving symptoms:', e);
                }
            },
            
            async submitForm() {
                if (!this.selectedRelation) return;
                this.submitLoading = true;
                this.submitError = '';
                
                const mrc = this.selectedRelation.mrc;
                const relation = this.selectedRelation.type === 'self' ? '帳號本人' : this.selectedRelation.relation;
                
                try {
                    const res = await fetch('/api/form_submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            medical_record_num: mrc,
                            relation: relation
                        })
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.formData[4] = '確認無誤';
                        this.active = 5;
                    } else {
                        this.submitError = data.message || '資料傳送失敗，請再試一次';
                    }
                } catch (e) {
                    this.submitError = '資料傳送失敗，請再試一次';
                }
                this.submitLoading = false;
            },
            
            async doLogin() {
                this.loginLoading = true;
                this.loginError = '';
                try {
                    const res = await fetch('/api/form_login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ account: this.loginAccount, password: this.loginPassword })
                    });
                    const data = await res.json();
                    if(data.success) {
                        this.loginSuccess = true;
                        this.doctorName = data.doctor_name;
                        this.doctorDept = data.department;
                        this.formData[1] = `您好 ${data.department} - ${data.doctor_name} 醫師`;
                        setTimeout(() => {
                            this.loginSuccess = false;
                            this.active = 2; 
                        }, 1000);
                    } else {
                        this.loginError = data.message;
                    }
                } catch(e) {
                    this.loginError = '網路錯誤，請稍後再試';
                }
                this.loginLoading = false;
            },
            
            async doLogout() {
                try {
                    await fetch('/api/form_logout', { method: 'POST' });
                } catch(e) {}
                this.formData[1] = '';
                this.formData[2] = '';
                this.formData[3] = '';
                this.doctorName = '';
                this.doctorDept = '';
                this.showPairSelect = false;
                this.lineUname = '';
                this.loginAccount = '';
                this.loginPassword = '';
                this.pairCodeStr = '';
                this.selectedRelation = null;
                this.relations = [];
                this.showLogoutConfirm = false;
                this.active = 1; 
                this.draftInputs.self.mrc = '';
                this.draftInputs.new.relation = '';
                this.draftInputs.new.mrc = '';
                this.existingScrolled = false;
                this.selectedSymptoms = [];
                this.activeRegion = null;
                this.showPrefillMsg = false;
            },
            
            async doPair() {
                if (this.pairCodeStr.length < 6) return;
                
                this.pairLoading = true;
                this.pairError = '';
                
                try {
                    const res = await fetch('/api/form_pair', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code: this.pairCodeStr })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        this.pairSuccess = true;
                        this.lineUname = data.line_uname;
                        this.lineUuid = data.line_uuid;
                        this.relations = data.relations || [];
                        setTimeout(() => {
                            this.pairSuccess = false;
                            this.showPairSelect = true;
                            
                            const hasSelf = this.relations.some(r => r.relation === '帳號本人');
                            if (!hasSelf) {
                                this.selectedRelation = this.draftInputs.self;
                            } else if (this.relations.length > 0) {
                                const sorted = [...this.relations].sort((a,b) => (a.relation === '帳號本人') ? -1 : (b.relation === '帳號本人') ? 1 : 0);
                                this.selectedRelation = { type: 'existing_0', relation: sorted[0].relation, mrc: sorted[0].medical_record_num };
                            } else {
                                this.selectedRelation = this.draftInputs.new;
                            }
                        }, 1000);
                    } else {
                        this.pairError = data.message;
                        this.pairCodeStr = '';
                        setTimeout(() => { this.$refs.pairInput?.focus(); }, 100);
                    }
                } catch(e) {
                    this.pairError = '網路錯誤，請稍後再試';
                }
                this.pairLoading = false;
            },

            init() {
                const doctor = window.doctorInfo;
                if (doctor) {
                    this.doctorName = doctor.doctor_name;
                    this.doctorDept = doctor.department;
                    this.formData[1] = `您好 ${doctor.department} - ${doctor.doctor_name} 醫師`;
                    this.active = 2;
                }
                
                const pairing = window.pairingInfo;
                if (pairing) {
                    this.lineUname = pairing.line_uname;
                    this.lineUuid = pairing.line_uuid;
                    this.relations = pairing.relations || [];
                    this.showPairSelect = true;
                    
                    const hasSelf = this.relations.some(r => r.relation === '帳號本人');
                    if (!hasSelf) {
                        this.selectedRelation = this.draftInputs.self;
                    } else if (this.relations.length > 0) {
                        const sorted = [...this.relations].sort((a,b) => (a.relation === '帳號本人') ? -1 : (b.relation === '帳號本人') ? 1 : 0);
                        this.selectedRelation = { type: 'existing_0', relation: sorted[0].relation, mrc: sorted[0].medical_record_num };
                    } else {
                        this.selectedRelation = this.draftInputs.new;
                    }

                    if (pairing.symptoms && pairing.symptoms.length > 0) {
                        this.selectedSymptoms = [...pairing.symptoms];
                        this.sessionLoaded = true;
                    }
                }
                
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                this.todayStr = `${yyyy}/${mm}/${dd}`;
                
                this.$watch('active', () => this.centerActive());
                this.centerActive();
                window.addEventListener('resize', () => this.centerActive());
            },

            centerActive() {
                if (!this.active) return;
                this.$nextTick(() => {
                    const el = document.getElementById('step-' + this.active);
                    const container = document.getElementById('scroll-container');
                    if (el && container) {
                        const rect = el.getBoundingClientRect();
                        const elCenter = rect.top + container.scrollTop + (rect.height / 2);
                        const targetCenter = window.innerHeight / 2;
                        const targetScroll = Math.max(0, elCenter - targetCenter);
                        container.scrollTo({
                            top: targetScroll,
                            behavior: 'smooth'
                        });
                    }
                });
            }
         }" class="w-full h-full relative scroll-smooth" id="scroll-container"
         :class="active <= 3 ? 'overflow-y-auto' : 'overflow-hidden'">

         <!-- Page Title at the top of background -->
         <div class="w-full text-center pt-12 pb-6 shrink-0 select-none">
             <h1 class="text-4xl font-extrabold tracking-widest text-slate-100/90 mb-16">
                病患衛教同步
             </h1>
         </div>

        <!-- Main Content Wrapper -->
        <div class="mx-auto w-full max-w-md flex flex-col items-center px-4">

            <template x-for="i in 5" :key="i">
                <div :id="'step-' + i" class="w-full flex flex-col items-center">
                    
                    <div class="py-2 w-full flex justify-center">
                        <div class="relative overflow-hidden transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] flex flex-col"
                             :class="[
                                 active === i 
                                    ? 'w-full h-auto min-h-[55vh] max-h-[75vh] bg-slate-900 rounded-[2rem] shadow-2xl border border-slate-700 cursor-default' 
                                    : (!formData[i] 
                                        ? 'w-14 h-14 rounded-[2rem] bg-slate-800 border-2 border-indigo-500 shadow-[0_0_15px_rgba(99,102,241,0.4)] shrink-0'

                                                        <div class="hotspot" :class="[(topicMapping['軀幹上半部'] || []).length === 0 ? 'disabled' : '', activeRegion === '軀幹上半部' ? 'active' : '', (activeRegion === null && (topicMapping['軀幹上半部'] || []).length > 0) ? 'pulse-glow' : '']" @click.stop="(topicMapping['軀幹上半部'] || []).length > 0 && showPopover('軀幹上半部', $event, 'body')" style="top: 20%; left: 5.22%; width: 58.88%; height: 17%;" title="軀幹上半部 (肺臟、心臟)"></div>
                                                        <div class="hotspot" :class="[(topicMapping['軀幹下半部'] || []).length === 0 ? 'disabled' : '', activeRegion === '軀幹下半部' ? 'active' : '', (activeRegion === null && (topicMapping['軀幹下半部'] || []).length > 0) ? 'pulse-glow' : '']" @click.stop="(topicMapping['軀幹下半部'] || []).length > 0 && showPopover('軀幹下半部', $event, 'body')" style="top: 38%; left: 2.13%; width: 64.77%; height: 19%;" title="軀幹下半部 (腸胃、器官)"></div>
                                                        <div class="hotspot" :class="[(topicMapping['腳'] || []).length === 0 ? 'disabled' : '', activeRegion === '腳' ? 'active' : '', (activeRegion === null && (topicMapping['腳'] || []).length > 0) ? 'pulse-glow' : '']" @click.stop="(topicMapping['腳'] || []).length > 0 && showPopover('腳', $event, 'body')" style="top: 59%; left: 31.56%; width: 38.27%; height: 39%;" title="腳"></div>
                                                    </div>
                                                </div>

                                                <!-- Right Column: 3 Buttons -->
                                                <div class="buttons-column">
                                                    <div class="hotspot bottom-btn btn-skin" :class="[(topicMapping['皮膚'] || []).length === 0 ? 'disabled' : '', activeRegion === '皮膚' ? 'active' : '', (activeRegion === null && (topicMapping['皮膚'] || []).length > 0) ? 'pulse-glow' : '']" @click.stop="(topicMapping['皮膚'] || []).length > 0 && showPopover('皮膚', $event, 'bottom')">皮膚</div>
                                                    <div class="hotspot bottom-btn btn-mental" :class="[(topicMapping['精神'] || []).length === 0 ? 'disabled' : '', activeRegion === '精神' ? 'active' : '', (activeRegion === null && (topicMapping['精神'] || []).length > 0) ? 'pulse-glow' : '']" @click.stop="(topicMapping['精神'] || []).length > 0 && showPopover('精神', $event, 'bottom')">精神</div>
                                                    <div class="hotspot bottom-btn btn-other" :class="[(topicMapping['其他'] || []).length === 0 ? 'disabled' : '', activeRegion === '其他' ? 'active' : '', (activeRegion === null && (topicMapping['其他'] || []).length > 0) ? 'pulse-glow' : '']" @click.stop="(topicMapping['其他'] || []).length > 0 && showPopover('其他', $event, 'bottom')">其他</div>
                                                </div>
                                            </div>

                                            <!-- Popover positioned relative to image-wrapper -->
                                            <div id="popover" 
                                                 x-show="activeRegion !== null" 
                                                 x-transition:enter="transition ease-out duration-200"
                                                 x-transition:enter-start="opacity-0 scale-95"
                                                 x-transition:enter-end="opacity-100 scale-100"
                                                 x-transition:leave="transition ease-in duration-100"
                                                 x-transition:leave-start="opacity-100 scale-100"
                                                 x-transition:leave-end="opacity-0 scale-95"
                                                 :class="popoverArrowClass"
                                                 :style="`position: absolute; top: ${popoverTop}px; left: ${popoverLeft}px; --arrow-top: ${arrowTop};`"
                                                 class="origin-center">
                                                <div class="popover-content">
                                                    <div class="flex justify-between items-center px-4 py-3 border-b border-slate-800 shrink-0">
                                                        <span class="font-bold text-slate-100" x-text="activeRegion"></span>
                                                        <button @click.stop="activeRegion = null" class="w-7 h-7 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-400 flex items-center justify-center transition-colors focus:outline-none">
                                                            <span class="material-symbols-outlined text-[18px]">close</span>
                                                        </button>
                                                    </div>
                                                    <div class="pop-checkbox-list">
                                                        <template x-for="topic in (topicMapping[activeRegion] || [])" :key="topic">
                                                            <div class="pop-checkbox-item" 
                                                                 :class="selectedSymptoms.includes(topic) ? 'selected' : ''"
                                                                 @click.stop="toggleSymptom(topic)">
                                                                <template x-if="selectedSymptoms.includes(topic)">
                                                                    <span class="material-symbols-outlined text-emerald-400 mr-2 text-[18px]">check</span>
                                                                </template>
                                                                <span x-text="topic"></span>
                                                            </div>
                                                        </template>
                                                        <template x-if="!(topicMapping[activeRegion] || []).length">
                                                            <span class="text-slate-500 text-sm p-2">此區域無相關衛教資料。</span>
                                                        </template>
                                                    </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Selected symptoms chip box at the bottom -->
                                    <div class="mt-4 p-4 rounded-xl bg-slate-900 border border-slate-800 shrink-0" x-show="selectedSymptoms.length > 0">
                                        <div x-show="showPrefillMsg" x-transition class="text-xs text-emerald-400 mb-2 font-medium">已根據上次紀錄自動選擇</div>
                                        <div class="chip-list flex flex-wrap gap-1.5">
                                            <template x-for="topic in selectedSymptoms" :key="topic">
                                                <div class="chip active cursor-pointer bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs font-medium py-1 px-2.5 rounded-full inline-flex items-center" @click="toggleSymptom(topic)">
                                                    <span class="mr-1">✓</span>
                                                    <span x-text="topic"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>

                                <!-- Card Body: Step 4 (Confirmation) -->
                                <template x-if="i === 4">
                                    <div class="flex-grow flex flex-col justify-between w-full min-h-0 select-none overflow-y-auto pr-1">
                                        <div class="space-y-4">
                                            <!-- Section: Patient -->
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-indigo-400 tracking-wider uppercase">綁定病患</span>
                                                <div class="flex items-center justify-between p-4 bg-slate-900 border border-slate-800 rounded-xl relative">
                                                    <!-- LINE side -->
                                                    <div class="flex items-center space-x-3 w-1/2">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 30 30" fill="#06C755" class="shrink-0">
                                                            <path d="M 6 4 C 4.895 4 4 4.895 4 6 L 4 24 C 4 25.105 4.895 26 6 26 L 24 26 C 25.105 26 26 25.105 26 24 L 26 6 C 26 4.895 25.105 4 24 4 L 6 4 z M 15.003906 7.6660156 C 19.720906 7.6660156 23.558594 10.780375 23.558594 14.609375 C 23.558594 16.142375 22.964609 17.523813 21.724609 18.882812 C 19.929609 20.948812 15.916906 23.464609 15.003906 23.849609 C 14.091906 24.233609 14.225719 23.604672 14.261719 23.388672 C 14.283719 23.260672 14.384766 22.65625 14.384766 22.65625 C 14.413766 22.43725 14.442469 22.099812 14.355469 21.882812 C 14.258469 21.645813 13.880563 21.520937 13.601562 21.460938 C 9.4895625 20.916937 6.4472656 18.041375 6.4472656 14.609375 C 6.4472656 10.781375 10.286906 7.6660156 15.003906 7.6660156 z M 12.626953 12.910156 C 12.375953 12.910156 12.171875 13.107656 12.171875 13.347656 L 12.171875 16.652344 C 12.171875 16.894344 12.375953 17.089844 12.626953 17.089844 C 12.877953 17.089844 13.082031 16.893344 13.082031 16.652344 L 13.082031 13.347656 C 13.082031 13.107656 12.877953 12.910156 12.626953 12.910156 z M 14.5625 12.910156 C 14.5175 12.910156 14.470781 12.915641 14.425781 12.931641 C 14.248781 12.991641 14.128906 13.157703 14.128906 13.345703 L 14.128906 16.650391 C 14.128906 16.892391 14.3225 17.089844 14.5625 17.089844 C 14.8025 17.089844 14.996094 16.890391 14.996094 16.650391 L 14.996094 14.605469 L 16.679688 16.914062 C 16.760687 17.024063 16.889391 17.089844 17.025391 17.089844 C 17.072391 17.089844 17.118109 17.082406 17.162109 17.066406 C 17.340109 17.006406 17.460938 16.840344 17.460938 16.652344 L 17.457031 16.652344 L 17.457031 13.347656 C 17.457031 13.107656 17.263391 12.910156 17.025391 12.910156 C 16.787391 12.910156 16.591797 13.107656 16.591797 13.347656 L 16.591797 15.392578 L 14.908203 13.085938 C 14.827203 12.975938 14.6985 12.910156 14.5625 12.910156 z M 18.929688 12.910156 C 18.678688 12.910156 18.474609 13.107656 18.474609 13.347656 L 18.474609 14.998047 L 18.474609 15 L 18.474609 16.650391 C 18.474609 16.892391 18.678687 17.089844 18.929688 17.089844 L 20.654297 17.089844 C 20.906297 17.089844 21.111328 16.892344 21.111328 16.652344 C 21.111328 16.412344 20.905297 16.216797 20.654297 16.216797 L 19.384766 16.216797 L 19.384766 15.435547 L 20.654297 15.435547 C 20.906297 15.435547 21.111328 15.24 21.111328 15 C 21.111328 14.758 20.905297 14.5625 20.654297 14.5625 L 19.384766 14.564453 L 19.384766 13.783203 L 20.654297 13.783203 C 20.906297 13.783203 21.111328 13.588656 21.111328 13.347656 C 21.111328 13.107656 20.905297 12.910156 20.654297 12.910156 L 18.929688 12.910156 z M 9.34375 12.912109 C 9.09275 12.912109 8.8886719 13.106656 8.8886719 13.347656 L 8.8886719 16.652344 C 8.8886719 16.894344 9.09275 17.089844 9.34375 17.089844 L 11.068359 17.089844 C 11.320359 17.089844 11.522438 16.893297 11.523438 16.654297 C 11.523437 16.414297 11.319359 16.21875 11.068359 16.21875 L 9.7988281 16.21875 L 9.7988281 13.347656 C 9.7988281 13.107656 9.59475 12.912109 9.34375 12.912109 z"></path>
                                                        </svg>
                                                        <span class="font-bold text-slate-100 text-sm truncate" x-text="lineUname"></span>
                                                    </div>
                                                    <!-- Chain icon -->
                                                    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
                                                        <span class="material-symbols-outlined text-slate-500 text-[18px]">link</span>
                                                    </div>
                                                    <!-- Patient side -->
                                                    <div class="flex items-center justify-end space-x-2 w-1/2">
                                                         <div class="flex flex-col text-right">
                                                             <span class="font-bold text-slate-100 text-sm" x-text="selectedRelation?.type === 'self' ? '帳號本人' : (selectedRelation?.relation || '新增')"></span>
                                                             <span class="text-xs text-slate-400" x-text="selectedRelation?.mrc || ''"></span>
                                                         </div>
                                                         <span class="material-symbols-outlined text-[24px] text-slate-300 shrink-0">account_circle</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- Divider / Vertical Line Spacer -->
                                            <div class="border-t border-slate-800 my-2"></div>

                                            <!-- Section: Discharge Materials -->
                                            <div class="space-y-2">
                                                <span class="text-xs font-semibold text-emerald-400 tracking-wider uppercase">提供衛教資料</span>
                                                <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl">
                                                    <div class="chip-list flex flex-wrap gap-1.5">
                                                        <template x-for="topic in selectedSymptoms" :key="topic">
                                                            <div class="chip active cursor-default bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs font-medium py-1 px-2.5 rounded-full inline-flex items-center">
                                                                <span x-text="topic"></span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- Divider / Vertical Line Spacer -->
                                            <div class="border-t border-slate-800 my-2"></div>

                                            <!-- Section: Date -->
                                            <div class="flex items-center justify-center space-x-2 text-slate-400 py-1 font-medium">
                                                <span class="material-symbols-outlined text-[20px] text-indigo-400">calendar_today</span>
                                                <span x-text="todayStr"></span>
                                            </div>
                                            
                                            <!-- Error display -->
                                            <div x-show="submitError" x-transition class="text-sm text-red-400 text-center font-medium bg-red-500/10 border border-red-500/20 p-3 rounded-xl">
                                                <span x-text="submitError"></span>
                                            </div>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="i === 5">
                                    <div class="flex-grow flex flex-col items-center justify-center py-8 select-none w-full">
                                        <div class="w-20 h-20 rounded-full bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(16,185,129,0.2)] animate-bounce">
                                            <span class="material-symbols-outlined text-emerald-400 text-[48px]">check</span>
                                        </div>
                                        <p class="text-slate-400 text-center text-sm">您可以關閉此分頁</p>
                                    </div>
                                </template>

                                <!-- Card Footer: Login -->
                                <template x-if="i === 1 && !showLogoutConfirm">
                                    <div class="mt-auto pt-6 shrink-0">
                                        <button @click="doLogin" :disabled="loginLoading || loginSuccess || !loginAccount.trim() || !loginPassword.trim()"
                                                class="w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all flex justify-center items-center focus:outline-none"
                                                :class="loginSuccess ? 'bg-emerald-600 hover:bg-emerald-500 shadow-emerald-600/30 cursor-pointer' : ((loginAccount.trim() && loginPassword.trim()) ? 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-600/30 cursor-pointer' : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed shadow-none opacity-50')">
                                            <span x-show="!loginLoading && !loginSuccess">登入</span>
                                            <svg x-show="loginLoading" class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                            </svg>
                                            <span x-show="loginSuccess" class="material-symbols-outlined text-white text-[1.5rem] animate-[bounce_0.5s_ease-in-out]">check</span>
                                        </button>
                                    </div>
                                </template>

                                <!-- Card Footer: Logout Confirm -->
                                <template x-if="i === 1 && showLogoutConfirm">
                                    <div class="mt-auto pt-6 shrink-0 flex space-x-4">
                                        <button @click="showLogoutConfirm = false; active = lastActive || 2;" class="flex-1 py-4 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-lg text-white transition-all focus:outline-none">取消</button>
                                        <button @click="doLogout" class="flex-1 py-4 bg-red-600 hover:bg-red-500 rounded-xl font-bold text-lg text-white shadow-lg shadow-red-600/30 transition-all focus:outline-none">登出</button>
                                    </div>
                                </template>

                                <!-- Card Footer: Pairing -->
                                <template x-if="i === 2 && !showPairSelect">
                                    <div class="mt-auto pt-6 shrink-0">
                                        <button @click="doPair" :disabled="pairLoading || pairSuccess || pairCodeStr.length < 6"
                                                class="w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all flex justify-center items-center focus:outline-none"
                                                :class="pairSuccess ? 'bg-emerald-600 hover:bg-emerald-500 shadow-emerald-600/30 cursor-pointer' : (pairCodeStr.length === 6 ? 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-600/30 cursor-pointer' : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed shadow-none opacity-50')">
                                            <span x-show="!pairLoading && !pairSuccess">配對</span>
                                            <svg x-show="pairLoading" class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                            </svg>
                                            <span x-show="pairSuccess" class="material-symbols-outlined text-white text-[1.5rem] animate-[bounce_0.5s_ease-in-out]">check</span>
                                        </button>
                                    </div>
                                </template>

                                <!-- Card Footer: Pair Select -->
                                <template x-if="i === 2 && showPairSelect">
                                    <div class="mt-auto pt-6 shrink-0">
                                        <button @click="doSelectPatient" :disabled="!(selectedRelation && ((selectedRelation.type === 'self' && draftInputs.self.mrc.trim()) || (selectedRelation.type === 'new' && draftInputs.new.relation.trim() && draftInputs.new.mrc.trim()) || selectedRelation.type.startsWith('existing')))"
                                                class="w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900"
                                                :class="(selectedRelation && ((selectedRelation.type === 'self' && draftInputs.self.mrc.trim()) || (selectedRelation.type === 'new' && draftInputs.new.relation.trim() && draftInputs.new.mrc.trim()) || selectedRelation.type.startsWith('existing'))) ? 'bg-emerald-600 hover:bg-emerald-500 shadow-emerald-600/30 focus:ring-emerald-500 cursor-pointer' : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed shadow-none opacity-50'">
                                            <span>選擇病患</span>
                                        </button>
                                    </div>
                                </template>

                                <!-- Card Footer: Step 3 (Discharge Info) -->
                                <template x-if="i === 3">
                                    <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-900 via-slate-900 to-transparent pt-16 z-20 pointer-events-none">
                                        <button @click="doDischarge()" :disabled="selectedSymptoms.length < 1"
                                                class="w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 pointer-events-auto"
                                                :class="selectedSymptoms.length >= 1 ? 'bg-emerald-600 hover:bg-emerald-500 shadow-emerald-600/30 focus:ring-emerald-500 cursor-pointer' : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed shadow-none opacity-50'">
                                            <span>確認</span>
                                        </button>
                                    </div>
                                </template>

                                <!-- Card Footer: Step 4 (Confirmation) -->
                                <template x-if="i === 4">
                                    <div class="mt-auto pt-6 shrink-0 flex space-x-3 w-full">
                                        <button @click="active = 3" :disabled="submitLoading"
                                                class="flex-1 py-4 rounded-xl font-bold text-lg text-slate-300 bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-all focus:outline-none disabled:opacity-50">
                                            <span>取消</span>
                                        </button>
                                        <button @click="submitForm()" :disabled="submitLoading"
                                                class="flex-1 py-4 rounded-xl font-bold text-lg text-white bg-indigo-600 hover:bg-indigo-500 shadow-lg shadow-indigo-600/30 transition-all focus:outline-none flex justify-center items-center">
                                            <span x-show="!submitLoading">確認</span>
                                            <svg x-show="submitLoading" class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </template>

                            </div>
                        </div>
                    </div>

                    <!-- Link: 5 dots -->
                    <div x-show="i < 5" class="flex flex-col items-center justify-evenly w-full opacity-60 transition-all duration-300"
                         :class="formData[i] ? 'py-0.5 h-2.5' : 'py-1 h-5'">
                        <template x-for="dot in (formData[i] ? 2 : 3)">
                            <div class="w-1.5 h-1.5 rounded-full transition-colors"
                                 :class="formData[i] && formData[i+1] ? 'bg-emerald-500/50' : 'bg-indigo-500/50'"></div>
                        </template>
                    </div>

                </div>
            </template>
            <!-- Dynamic Bottom Spacer to clamp centering scroll range -->
            <div :style="`height: calc(50vh - ${active === 1 ? '200px' : active === 2 ? '250px' : '300px'});`" class="w-full shrink-0 transition-all duration-300"></div>

        </div>
    </div>

</body>
</html>
