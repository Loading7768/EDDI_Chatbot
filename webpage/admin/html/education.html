<!-- 衛教資料管理（管理員）-->
<section class="section" id="section-education">
  <div class="section-title">📚 衛教資料管理</div>
  <p style="color:var(--muted); font-size:13px; margin-top:4px;">
    新增、編輯、刪除聊天機器人使用的衛教資料類別（點部位可展開/收合）。
  </p>

  <div style="display:flex; justify-content:flex-end; margin-top:16px;">
    <button class="btn btn-primary" onclick="openEducationCreateModal()">+ 新增類別</button>
  </div>

  <div class="doctor-table-wrap" id="education-table-wrap">
    <div id="education-groups"></div>
  </div>

  <div class="empty-state" id="education-empty" style="display:none;">
    <div class="empty-icon">📚</div>
    <p>目前尚無衛教資料類別，請點選右上角「新增類別」建立第一筆資料。</p>
  </div>
</section>

<!-- ── Modal：新增 / 編輯衛教類別 ── -->
<div class="modal-backdrop" id="modal-education-edit">
  <div class="modal">
    <div class="modal-title" id="education-modal-title">
      <span>📚</span> <span id="education-modal-title-text">新增衛教類別</span>
    </div>

    <div class="form-group">
      <label>部位</label>
      <input type="text" id="education-input-bodypart" placeholder="例如：頭、脖子、軀幹上半部">
    </div>

    <div class="form-group">
      <label>類別名稱</label>
      <input type="text" id="education-input-category" placeholder="例如：頭暈">
    </div>

    <div class="form-group">
      <label>對應 md 檔名</label>
      <input type="text" id="education-input-filename" placeholder="例如：dizziness.md 或 dizziness（會自動補 .md）">
    </div>

    <div class="form-group">
      <label>衛教內容</label>
      <textarea id="education-input-content" rows="12" placeholder="請輸入完整的衛教內容文字"></textarea>
    </div>

    <p class="error-msg" id="education-modal-error" style="text-align:left; display:none;"></p>

    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeEducationEditModal()">取消</button>
      <button class="btn btn-primary" id="education-save-btn" onclick="submitEducationForm()">儲存</button>
    </div>
  </div>
</div>

<!-- ── Modal：刪除確認 ── -->
<div class="modal-backdrop modal-backdrop-alert" id="modal-education-delete">
  <div class="modal-alert">
    <div class="modal-alert-icon-wrap danger">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
    </div>
    <div class="modal-alert-title">確認刪除衛教類別</div>
    <div class="modal-alert-banner danger">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <div style="font-weight:600; font-size:14px; line-height:1.45;">
        即將刪除類別「<span id="education-delete-target"></span>」，此操作無法復原。
      </div>
    </div>
    <div class="modal-alert-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-education-delete')">取消</button>
      <button class="btn btn-danger" onclick="confirmDeleteEducation()">確認刪除</button>
    </div>
  </div>
</div>
