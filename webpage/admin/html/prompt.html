<!-- Prompt 修改 -->
<section id="section-prompt" class="section">
  <div class="section-title">
    系統 Prompt 修改
    <span class="role-tag role-admin" style="margin-left:8px;vertical-align:middle;">管理員</span>
  </div>
  <div class="prompt-layout">
    <!-- 左側 1/5 列表 -->
    <div class="prompt-col-left">
      <div class="plist-header" style="background: var(--bg); border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; padding: 12px 16px;">
        📁 Prompt 版本列表
      </div>
      <div id="prompt-version-list" style="flex: 1; overflow-y: auto;">
        <!-- 列表內容由 JS 產生 -->
      </div>
    </div>

    <!-- 中間 2/5 修改框 -->
    <div class="prompt-col-center">
      <div style="font-weight: 700; font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;">
        <span>✏️ 編輯框 (<code id="editing-version-label">-</code>)</span>
        <span id="active-badge" class="badge badge-green" style="display:none;">目前使用中</span>
      </div>
      <div class="prompt-info" style="margin-bottom: 8px;">
        ℹ️ 修改將會儲存並新增一個版本。最原始的 <code>prompt_001.md</code> 將會被保留。
      </div>
      <!-- 自定義 prompt 暱稱 -->
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; background: var(--bg); padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--border);">
        <span style="font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap;">自訂名稱：</span>
        <input type="text" id="prompt-nickname-input" placeholder="例如：活潑版本" style="flex: 1; padding: 6px 10px; border-radius: 6px; border: 1.5px solid var(--border); font-size: 13px; outline: none; background: #fff; color: var(--text);">
        <button class="btn btn-primary" id="btn-save-nickname" onclick="savePromptNickname()" style="padding: 6px 14px; font-size: 13px; width: auto; flex-shrink: 0; white-space: nowrap;">💾 儲存名稱</button>
      </div>
      <textarea id="prompt-textarea" placeholder="載入中…" oninput="checkPromptModified()" style="flex: 1; resize: none; margin-bottom: 12px;"></textarea>
      
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;">
        <!-- 左側小按鈕 ↩️ 和 ↪️ -->
        <div style="display: flex; gap: 6px;">
          <button class="btn btn-gray" id="btn-rollback-prompt" onclick="prevPromptVersion()" style="padding: 6px 12px; font-size: 15px;" title="前一個版本">↩️</button>
          <button class="btn btn-gray" id="btn-next-prompt" onclick="nextPromptVersion()" style="padding: 6px 12px; font-size: 15px;" title="後一個版本">↪️</button>
        </div>
        
        <!-- 右側功能按鈕 -->
        <div style="display: flex; gap: 8px; align-items: center; justify-content: flex-end; flex-wrap: nowrap; white-space: nowrap;">
          <button class="btn btn-danger" id="btn-delete-prompt" onclick="deletePrompt()" style="display:none; white-space: nowrap; width: auto; flex-shrink: 0;">🗑️ 刪除</button>
          <button class="btn btn-primary" id="btn-save-prompt" onclick="savePrompt()" disabled style="white-space: nowrap; width: auto; flex-shrink: 0;">💾 儲存並新增</button>
          <button class="btn btn-accent" id="btn-apply-prompt" onclick="applyPrompt()" disabled style="white-space: nowrap; width: auto; flex-shrink: 0;">套用</button>
        </div>
      </div>
      <div class="save-status" id="save-status" style="margin-top: 8px; font-size: 12px; min-height: 18px;"></div>
    </div>

    <!-- 右側 2/5 當前使用的 prompt -->
    <div class="prompt-col-right" id="prompt-active-column">
      <div style="font-weight: 700; font-size: 14px; margin-bottom: 8px;">
        🟢 目前使用的 Prompt (<code id="active-version-label">-</code>)
      </div>
      <textarea id="prompt-active-textarea" readonly placeholder="載入中…" style="flex: 1; resize: none; background: #fafafa; color: var(--muted); cursor: not-allowed;"></textarea>
    </div>
  </div>
</section>

<!-- ── Modal：確認套用 Prompt ── -->
<div class="modal-backdrop modal-backdrop-alert" id="modal-confirm-apply-prompt">
  <div class="modal-alert">
    <div class="modal-alert-icon-wrap warning">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
    </div>
    <div class="modal-alert-title">確認套用此 Prompt 版本</div>
    <div class="modal-alert-banner warning">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <div style="font-weight: 600; font-size: 14px; line-height: 1.45;">此操作將變更 LINE Bot 目前套用的 active 系統 Prompt！</div>
    </div>
    <div class="modal-alert-subtitle">這會立即影響 LINE Bot 的回覆邏輯，確定要套用嗎？</div>
    <div class="modal-alert-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-confirm-apply-prompt')">取消</button>
      <button class="btn btn-danger" onclick="doApplyPrompt()">確認套用</button>
    </div>
  </div>
</div>

<!-- ── Modal：確認刪除 Prompt ── -->
<div class="modal-backdrop modal-backdrop-alert" id="modal-confirm-delete-prompt">
  <div class="modal-alert">
    <div class="modal-alert-icon-wrap danger">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
      </svg>
    </div>
    <div class="modal-alert-title">確認刪除目前版本</div>
    <div class="modal-alert-banner danger">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <div style="font-weight: 600; font-size: 14px; line-height: 1.45;">此操作將永久刪除當前的 Prompt 檔案，且不可復原！</div>
    </div>
    <div class="modal-alert-subtitle">系統將會自動切換到相鄰的其他版本。確定要刪除嗎？</div>
    <div class="modal-alert-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-confirm-delete-prompt')">取消</button>
      <button class="btn btn-danger" onclick="doDeletePrompt()">確認刪除</button>
    </div>
  </div>
</div>
