<!-- 統計數據 -->
<section id="section-stats" class="section active">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <div class="section-title" style="margin-bottom: 0;">統計數據</div>
    <button class="btn btn-blue btn-sm" onclick="exportStatsCSV()" style="display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; font-weight: 500; cursor: pointer;">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
      </svg>
      <span>下載 CSV</span>
    </button>
  </div>
  <div class="stats-grid">
    <div class="stat-card green" data-definition="已在系統中建立就診紀錄（病歷表單）的獨特病患病歷號碼總數。">
      <div class="stat-icon">🧑‍⚕️</div>
      <div class="stat-value" id="s-patients">—</div>
      <div class="stat-label">病患總數</div>
    </div>
    <div class="stat-card orange" data-definition="已開始對話聊天（有 chat_logs 聊天記錄檔）的病患數，佔 LINE 帳號好友總數的百分比。">
      <div class="stat-icon">📱</div>
      <div class="stat-value" id="s-usage">—</div>
      <div class="stat-label">LINE Bot 使用率</div>
    </div>
  </div>
  <div class="last-updated" id="s-updated"></div>
  <p style="color:var(--danger);font-size:13px;margin-top:8px;" id="s-error"></p>
</section>
