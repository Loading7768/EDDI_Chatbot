<!--Current: expanded card-->
<template x-if="i === currentStep">
    <div class="flex flex-col h-full">

        <template x-if="step.mode === 'login'">
            <div class="login-wrapper">

                <!-- Header -->
                <div class="shrink-0 px-4 pt-4 pb-2">
                    <div class="text-2xl font-medium text-gray-800 mb-6">請登入醫師帳號</div>
                </div>

                <!-- Body -->
                <div class="flex-1 overflow-y-auto px-4">

                    <span
                        class="block text-center material-symbols-outlined text-[6rem] text-blue-500 opacity-90 mb-6">stethoscope</span>

                    <div class="relative mb-4">
                        <input type="text" id="account" x-model="step.account"
                            class="block rounded-xl px-4 pt-6 pb-2 w-full text-white bg-slate-800 border border-slate-600 appearance-none focus:outline-none focus:ring-0 focus:border-indigo-500 peer"
                            placeholder=" " />
                        <label for="account"
                            class="absolute text-slate-400 duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-indigo-500">
                            帳號
                        </label>
                    </div>
                    <div class="relative mb-4">
                        <input type="password" id="password" x-model="step.password"
                            class="block rounded-xl px-4 pt-6 pb-2 w-full text-white bg-slate-800 border border-slate-600 appearance-none focus:outline-none focus:ring-0 focus:border-indigo-500 peer"
                            placeholder=" " />
                        <label for="password"
                            class="absolute text-slate-400 duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-indigo-500">
                            密碼
                        </label>
                    </div>

                    <div x-show="step.error" x-transition class="text-red-400 text-sm font-medium text-center"
                        x-text="step.error"></div>

                </div>

                <!-- Footer -->
                <div class="shrink-0 px-2 pt-4 pb-4">
                    <button @click="submitLogin()" :disabled="!step.account.trim() || !step.password.trim()"
                        class="w-full text-sm text-white bg-blue-500 px-3 py-2 rounded-[2rem]">
                        登入
                    </button>
                </div>

            </div>
        </template>

        <template x-if="step.mode === 'authed'">
            <div class="logout-wrapper">

                <!-- Header -->
                <div class="shrink-0 px-4 pt-4 pb-2">
                    <div class="text-2xl font-medium text-gray-800 mb-6">確認登出？</div>
                </div>

                <!-- Body -->
                <div class="flex-1 overflow-y-auto px-4">

                    <div class="flex flex-col items-center mb-6">
                        <span class="material-symbols-outlined text-[6rem] text-red-500 mb-6">logout</span>
                        <p class="text-gray-500 font-medium">未送出資料將不會保存</p>
                    </div>

                </div>

                <!-- Footer -->
                <div class="shrink-0 px-4 pt-2 pb-4 flex gap-2">
                    <button @click="cancelLogout()"
                        class="flex-1 text-sm text-gray-600 bg-gray-100 px-3 py-2 rounded-[2rem]">
                        取消
                    </button>
                    <button @click="confirmLogout()"
                        class="flex-1 text-sm text-white bg-red-500 px-3 py-2 rounded-[2rem]">
                        登出
                    </button>
                </div>

            </div>
        </template>

    </div>
</template>

<!-- Completed: compact summary -->
<template x-if="step.completed && i !== currentStep">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-blue-200 text-[20px] shrink-0">stethoscope</span>
        <div class="text-sm text-blue-50">
            您好！<span class="font-bold" x-text="step.doctorName"></span> 醫師
        </div>
    </div>
</template>
