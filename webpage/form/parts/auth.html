<!--Current: expanded card-->
<template x-if="i === currentStep">
    <div class="flex flex-col h-full">

        <template x-if="!step.authed">
            <div class="login-wrapper">

                <!-- Header -->
                {{ card_header('請登入醫師帳號') }}

                <!-- Body -->
                <div class="flex-1 overflow-y-auto px-4">

                    <span class="block text-center material-symbols-rounded text-6xl text-blue-400 mb-6">stethoscope</span>

                    <div class="relative mb-4">
                        <input type="text" id="account" x-model="step.account"
                            class="block rounded-xl px-4 pt-6 pb-2 w-full text-white bg-slate-800 border border-slate-600 appearance-none focus:outline-none focus:ring-0 focus:border-indigo-500 peer"
                            placeholder=" " />
                        <label for="account"
                            class="absolute text-slate-400 duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-indigo-500">
                            帳號
                        </label>
                    </div>
                    <div class="relative mb-4">
                        <input type="password" id="password" x-model="step.password"
                            class="block rounded-xl px-4 pt-6 pb-2 w-full text-white bg-slate-800 border border-slate-600 appearance-none focus:outline-none focus:ring-0 focus:border-indigo-500 peer"
                            placeholder=" " />
                        <label for="password"
                            class="absolute text-slate-400 duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-indigo-500">
                            密碼
                        </label>
                    </div>

                    <!-- <div x-show="step.error" x-transition class="text-red-400 text-sm font-medium text-center"
                        x-text="step.error"></div> -->

                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmLogin()',
                    disableCond='!step.account || !step.password',
                    textColor='text-blue-950',
                    bgColor='bg-blue-400',
                    label='登入'
                ) }}

            </div>
        </template>

        <template x-if="step.authed">
            <div class="logout-wrapper">

                <!-- Header -->
                <!-- {{ card_header('確認登出？') }} -->
                <div class="shrink-0 px-4 pt-4 mb-6 flex justify-between">

                    <div class="text-2xl font-medium text-slate-400">確認登出？</div>
                    <button @click="cancelLogout()"
                            class="flex items-center text-slate-800 bg-slate-400 p-1 rounded-[2rem] transition-all duration-200 ease-spring
                            active:px-2 active:rounded-lg">
                        <span class="flex items-center material-symbols-rounded">cancel</span>
                    </button>

                </div>

                <!-- Body -->
                <div class="flex-1 overflow-y-auto flex flex-col items-center px-4 py-12">

                    <span class="material-symbols-rounded text-6xl text-red-400 mb-2">logout</span>
                    <p class="text-slate-400 font-medium">未送出資料將不會保存</p>

                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmLogout()',
                    disableCond='false',
                    textColor='text-red-950',
                    bgColor='bg-red-400',
                    label='登出'
                ) }}

            </div>
        </template>

    </div>
</template>

<!-- Completed: compact summary -->
<template x-if="step.completed && i !== currentStep">
    <div class="flex items-center gap-4">
        <span class="material-symbols-rounded text-blue-400">stethoscope</span>
        <div class="font-medium text-blue-400">
            您好！    <span class="text-amber-400" x-text="step.doctorName"></span> 醫師
        </div>
    </div>
</template>
