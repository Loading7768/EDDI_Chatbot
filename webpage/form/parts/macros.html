{% macro card_header(titleText) %}
<div class="shrink-0 px-4 pt-4 mb-6">
     <div class="text-2xl font-medium text-slate-400">{{ titleText }}</div>
</div>
{% endmacro %}

{% macro footer_button(clickFunc, disableCond, textColor, bgColor, label) %}
<div class="shrink-0 px-4 py-4 flex justify-center">
    <button @click="{{ clickFunc }}"
            :disabled="step.currentStatus !== STATUS.IDLE || {{ disableCond }}"
            class="
                text-lg font-medium {{ textColor }} {{ bgColor }} h-12
                transition-all duration-200 ease-spring
                active:px-16 active:rounded-lg
                disabled:pointer-events-none"
            :class="[
                step.currentStatus === STATUS.IDLE ? 'px-14' : 'px-3',
                step.currentStatus === STATUS.SUCCESS ? 'rounded-lg scale-110' : 'rounded-[2rem]',
                {{ disableCond }} ? 'opacity-25' : '',
            ]">

        <span x-show="step.currentStatus === STATUS.LOADING"
            class="animate-spin-spring flex items-center material-symbols-rounded">
            data_usage
        </span>
        <span x-show="step.currentStatus === STATUS.SUCCESS"
            class="flex items-center material-symbols-rounded">
            check_circle
        </span>
        <span x-show="step.currentStatus === STATUS.IDLE">{{ label }}</span>
    </button>
</div>
{% endmacro %}

{% macro text_input(inputId, inputType, label) %}
<div class="relative" x-data="{ focused: false }">
    <input type="{{ inputType }}"
            id="{{ inputId }}"
            x-model="step.draft.{{ inputId }}"
            @focus="focused = true; step.error = null"
            @blur="focused = false"
            class="w-full font-medium text-slate-200 bg-slate-700 border-2 border-transparent rounded-[1rem] px-6 py-3 focus:outline-none peer"
            :class="focused ? 'border-blue-400' :
                    step.error ? 'border-red-400' : ''"
            placeholder=" " />
    <label for="{{ inputId }}"
            class="absolute font-medium start-4 top-4 rounded-lg z-10
                    transition-all duration-200 ease-spring"
            :class="[
                focused ? '-translate-y-7 text-blue-950 bg-blue-400 px-4' :
                step.error ? '-translate-y-7 text-red-950 bg-red-400 px-4' :
                step.draft.{{ inputId }} ? '-translate-y-7 text-slate-400 bg-transparent px-2' : 'text-slate-400 px-2'
            ]">
        {{ label }}
    </label>
</div>
{% endmacro %}
