<!--Current: expanded card-->
<template x-if="i === currentStep">
    <div class="flex flex-col h-full animate-fade-in">

        <template x-if="!step.paired">
            <div class="line-wrapper">

                <!-- Header -->
                {{ card_header('請輸入配對碼') }}

                <!-- Body -->
                <div class="flex-1 overflow-y-auto items-center px-4 mt-16 mb-10">

                    <!-- Input Wrapper  -->
                    <div class="relative flex items-center justify-center px-4" dir="ltr"
                            x-data="{ focused: false }">

                        <!-- The Real Input (Hidden) -->
                        <input x-ref="pairInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                            x-model="step.pairingCode"
                            @input="step.pairingCode = step.pairingCode.replace(/[^0-9]/g, '')"
                            @mousedown.prevent="$el.focus()"
                            @keyup="$el.setSelectionRange($el.value.length, $el.value.length)"
                            @focus="focused = true; $nextTick(() => $el.setSelectionRange($el.value.length, $el.value.length))"
                            @blur="focused = false"
                            class="absolute w-full h-full opacity-0 select-none caret-transparent z-10"/>

                        <!-- Input Display -->
                        <template x-for="idx in [0,1,2,3,4,5]" :key="idx">
                            <div class="h-12 rounded-[2rem] flex justify-center items-center
                                    text-2xl font-extrabold text-slate-200
                                    transition-all duration-200 ease-spring"
                                :class="
                                    step.pairingCode.length === 6 ?
                                    'w-8 mx-0 rounded-none ' + (focused ? 'bg-amber-900' : 'bg-slate-700') + (idx === 0 ? ' rounded-s-2xl pl-2' : idx === 5 ? ' rounded-e-2xl pr-2' : ' w-6')
                                    : 'mx-auto ' + ((step.pairingCode.length === idx && focused) ? 'w-16 bg-amber-900 rounded-lg' : 'w-8 bg-slate-700')">
                                <span x-text="step.pairingCode[idx] || ''"></span>
                            </div>
                        </template>
                    </div>

                    <div x-show="step.error" class="text-red-500 font-medium text-center my-6" x-text="step.error"></div>

                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmPair()',
                    disableCond='step.pairingCode.length < 6',
                    textColor='text-blue-950',
                    bgColor='bg-blue-400',
                    label='配對'
                ) }}

            </div>
        </template>

        <template x-if="step.paired">
            <div class="patient-wrapper animate-fade-in">

                <!-- Header -->
                {{ card_header('請選擇本次聊天病患') }}

                <!-- Body -->
                <div class="flex-1 overflow-y-auto p-4 relative min-h-0 flex flex-col w-full">
                    <!-- LINE and Patient Status display -->
                    <div class="flex items-center justify-between mt-2 mb-6 shrink-0 px-5 relative z-10">
                        <!-- LINE side -->
                        <div class="flex items-center space-x-2 w-1/2 min-w-0">
                            <img src="/assets/svg/line_icon.svg" width="24" height="24" class="w-6 h-6 shrink-0" alt="LINE">
                            <span class="font-bold text-slate-400 truncate text-sm" x-text="step.lineUname"></span>
                        </div>

                        <!-- Chain icon -->
                        <div
                            class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
                            <span class="material-symbols-rounded text-slate-400">link</span>
                        </div>
                        
                        <!-- Patient side -->
                        <div class="flex items-center justify-end space-x-2 w-1/2 min-w-0 text-amber-400 text-sm">
                            <div class="flex flex-col text-right">
                                <!-- Relation Name -->
                                <span class="font-bold"
                                    x-text="step.selectedRelation?.relation ? (step.selectedRelation.relation || '新增') : '???'">
                                </span >

                                <!-- MRC Value -->
                                <span x-text="step.selectedRelation?.mrc
                                    || (step.selectedRelation?.relation === '帳號本人'
                                    ? step.draft?.self?.mrc?.trim() : '')
                                    || '???'"></span>
                            </div>
                            
                            <span class="material-symbols-rounded">account_circle</span>
                        </div>
                    </div>

                    <!-- List -->
                    <div class="flex flex-col gap-3 min-h-0 w-full pb-1 overflow-y-auto pr-1">

                        <!-- SELF & EXISTING -->
                        <div class="relative w-full shrink-0">
                            <!-- Scrollable list -->
                            <div class="max-h-[150px] overflow-y-auto flex flex-col gap-1 pr-1"
                                @scroll="step.existingScrolled = $el.scrollTop > 0">
                                <template x-for="(r, idx) in step.relations" :key="idx">
                                    
                                    <div class="p-4 transition-all duration-200 ease-spring"
                                         :class="step.selectedRelation?.type === 'existing_' + idx ? 'text-amber-400 bg-amber-950 rounded-[2rem]' : 'text-blue-400 bg-blue-950 rounded-lg'"
                                         @click="step.selectedRelation = { type: 'existing_' + idx, relation: r.relation, mrc: r.medical_record_num };">
                                        
                                        <div class="flex-grow flex justify-center items-center">
                                            <span class="material-symbols-rounded transition-all duration-200 ease-spring"
                                                    :class="step.selectedRelation?.type === 'existing_' + idx ? 'w-6 mr-2' : 'w-0 -translate-x-12'">
                                                    check_circle
                                            </span>
                                            
                                            <div class="flex-grow">
                                                <span class="font-medium mr-auto" x-text="r.relation"></span>
                                                <template x-if="r.relation === '帳號本人' && !r.medical_record_num && step.selectedRelation?.type === 'existing_' + idx">
                                                    <div class="mt-5" @click.stop>
                                                      {{ text_input(
                                                          inputId='self.mrc',
                                                          inputType='text',
                                                          label='病歷號'
                                                      ) }}
                                                    </div>
                                                </template>
                                            </div>

                                             <div x-text="r.medical_record_num"></div>
                                        </div>

                                    </div>

                                </template>
                            </div>
                        </div>

                        <!-- NEW -->
                        <div class="w-full p-4 transition-all duration-200 ease-spring"
                            :class="step.selectedRelation?.type === 'new' ? 'bg-amber-950 rounded-[2rem]' : 'bg-blue-950 rounded-lg'"
                            @click="if(!step.selectedRelation || step.selectedRelation.type !== 'new') step.selectedRelation = step.draft.new;">

                            <!-- When NOT selected -->
                            <div x-show="step.selectedRelation?.type !== 'new'"
                                 class="flex font-bold text-blue-400 justify-center items-center">
                                新增
                            </div>

                            <!-- When selected -->
                            <div x-show="step.selectedRelation?.type === 'new'" class="flex items-center" @click.stop>
                                <!-- Icon -->
                                <div class="flex items-center justify-center">
                                    <span class="material-symbols-rounded text-amber-400">add_circle</span>
                                </div>
                                <!-- Two input fields -->
                                <div class="flex-grow flex flex-col space-y-5">
                                    {{ text_input(
                                        inputId='new.relation',
                                        inputType='text',
                                        label='稱呼'
                                    ) }}
                                    
                                    {{ text_input(
                                        inputId='new.mrc',
                                        inputType='text',
                                        label='病歷號'
                                    ) }}

                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Error msg display -->
                    <div x-show="step.pairSelectError" x-transition
                        class="text-red-500 text-sm font-medium text-center mt-2 shrink-0"
                        x-text="step.pairSelectError"></div>
                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmPatient()',
                    disableCond="!(step.selectedRelation
                        && ((step.selectedRelation.type.startsWith('existing') && step.selectedRelation.relation === '帳號本人' && !step.selectedRelation.mrc && step.draft.self.mrc.trim())
                        || (step.selectedRelation.type.startsWith('existing') && !(step.selectedRelation.relation === '帳號本人' && !step.selectedRelation.mrc))
                        || (step.selectedRelation.type === 'new' && step.draft.new.relation.trim() && step.draft.new.mrc.trim()))
                    )",
                    textColor='text-blue-950',
                    bgColor='bg-blue-400',
                    label='選擇病患'
                ) }}

            </div>
        </template>

    </div>
</template>

<!-- Completed: compact summary -->
<template x-if="step.completed && i !== currentStep">
    <div class="flex items-center gap-4 animate-fade-in">

        <span class="material-symbols-rounded text-blue-400">account_circle</span>

        <div class="flex text-blue-400">
            <span class="mr-2 text-amber-400" x-text="step.selectedRelation?.relation"></span>
            <span x-text="step.selectedRelation?.mrc"></span>
        </div>

    </div>
</template>
