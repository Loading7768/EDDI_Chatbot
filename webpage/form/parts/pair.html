<!--Current: expanded card-->
<template x-if="i === currentStep">
    <div class="flex flex-col h-full">

        <template x-if="!step.paired">
            <div class="line-wrapper">

                <!-- Header -->
                {{ card_header('請配對LINE帳號') }}

                <!-- Body -->
                <div class="flex-1 overflow-y-auto px-4 flex flex-col justify-center items-center w-full my-12">
                    <div class="space-y-6 w-full">
                        <p class="text-slate-400 text-center font-medium">請輸入6位配對碼</p>
                        <div class="relative flex justify-between w-full px-2" dir="ltr"
                            @click="$refs.pairInput.focus()">
                            <input x-ref="pairInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                                x-model="step.paringCode"
                                @input="step.paringCode = step.paringCode.replace(/[^0-9]/g, '')"
                                class="absolute inset-0 w-full h-full opacity-0 cursor-text z-10" />

                            <template x-for="idx in [0,1,2,3,4,5]" :key="idx">
                                <div class="w-10 h-14 sm:w-12 sm:h-16 flex items-center justify-center text-2xl font-bold text-amber-400 bg-transparent border-b-2 transition-colors"
                                    :class="step.paringCode.length === idx ? 'border-indigo-500' : 'border-slate-400'">
                                    <span x-text="step.paringCode[idx] || ''"></span>
                                </div>
                            </template>
                        </div>
                        <div x-show="step.error" x-transition class="text-red-500 text-sm font-medium text-center"
                            x-text="step.error"></div>
                    </div>
                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmPair()',
                    disableCond='step.paringCode.length < 6',
                    textColor='text-blue-950',
                    bgColor='bg-blue-400',
                    label='配對'
                ) }}

            </div>
        </template>

        <template x-if="step.paired">
            <div class="patient-wrapper">

                <!-- Header -->
                {{ card_header('請選擇本次聊天病患') }}

                <!-- Body -->
                <div class="flex-1 overflow-y-auto p-4 relative min-h-0 flex flex-col w-full">
                    <!-- LINE and Patient Status display -->
                    <div class="flex items-center justify-between mt-2 mb-6 shrink-0 px-5 relative z-10">
                        <!-- LINE side -->
                        <div class="flex items-center space-x-2 w-1/2 min-w-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 30 30"
                                fill="#06C755" class="shrink-0">
                                <path
                                    d="M 6 4 C 4.895 4 4 4.895 4 6 L 4 24 C 4 25.105 4.895 26 6 26 L 24 26 C 25.105 26 26 25.105 26 24 L 26 6 C 26 4.895 25.105 4 24 4 L 6 4 z M 15.003906 7.6660156 C 19.720906 7.6660156 23.558594 10.780375 23.558594 14.609375 C 23.558594 16.142375 22.964609 17.523813 21.724609 18.882812 C 19.929609 20.948812 15.916906 23.464609 15.003906 23.849609 C 14.091906 24.233609 14.225719 23.604672 14.261719 23.388672 C 14.283719 23.260672 14.384766 22.65625 14.384766 22.65625 C 14.413766 22.43725 14.442469 22.099812 14.355469 21.882812 C 14.258469 21.645813 13.880563 21.520937 13.601562 21.460938 C 9.4895625 20.916937 6.4472656 18.041375 6.4472656 14.609375 C 6.4472656 10.781375 10.286906 7.6660156 15.003906 7.6660156 z M 12.626953 12.910156 C 12.375953 12.910156 12.171875 13.107656 12.171875 13.347656 L 12.171875 16.652344 C 12.171875 16.894344 12.375953 17.089844 12.626953 17.089844 C 12.877953 17.089844 13.082031 16.893344 13.082031 16.652344 L 13.082031 13.347656 C 13.082031 13.107656 12.877953 12.910156 12.626953 12.910156 z M 14.5625 12.910156 C 14.5175 12.910156 14.470781 12.915641 14.425781 12.931641 C 14.248781 12.991641 14.128906 13.157703 14.128906 13.345703 L 14.128906 16.650391 C 14.128906 16.892391 14.3225 17.089844 14.5625 17.089844 C 14.8025 17.089844 14.996094 16.890391 14.996094 16.650391 L 14.996094 14.605469 L 16.679688 16.914062 C 16.760687 17.024063 16.889391 17.089844 17.025391 17.089844 C 17.072391 17.089844 17.118109 17.082406 17.162109 17.066406 C 17.340109 17.006406 17.460938 16.840344 17.460938 16.652344 L 17.457031 16.652344 L 17.457031 13.347656 C 17.457031 13.107656 17.263391 12.910156 17.025391 12.910156 C 16.787391 12.910156 16.591797 13.107656 16.591797 13.347656 L 16.591797 15.392578 L 14.908203 13.085938 C 14.827203 12.975938 14.6985 12.910156 14.5625 12.910156 z M 18.929688 12.910156 C 18.678688 12.910156 18.474609 13.107656 18.474609 13.347656 L 18.474609 14.998047 L 18.474609 15 L 18.474609 16.650391 C 1                                 </path>
                            </svg>
                            <span class="font-bold text-slate-400 truncate text-sm" x-text="step.lineUname"></span>
                        </div>
                        <!-- Chain icon -->
                        <div
                            class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
                            <span class="material-symbols-rounded text-slate-400">link</span>
                        </div>
                        <!-- Patient side -->
                        <div class="flex items-center justify-end space-x-2 w-1/2 min-w-0 text-amber-400 text-sm">
                            <div class="flex flex-col text-right">
                                <!-- Relation Name -->
                                <span class="font-bold"
                                    x-text="step.selectedRelation?.relation ? (step.selectedRelation.relation || '新增') : '???'">
                                </span >

                                <!-- MRC Value -->
                                <span x-text="step.selectedRelation?.mrc
                                    || (step.selectedRelation?.relation === '帳號本人'
                                    ? step.draft?.self?.mrc?.trim() : '')
                                    || '???'"></span>
                            </div>
                            
                            <span class="material-symbols-rounded">account_circle</span>
                        </div>
                    </div>

                    <!-- List -->
                    <div class="flex flex-col gap-3 min-h-0 w-full pb-1 overflow-y-auto pr-1">

                        <!-- SELF & EXISTING -->
                        <div class="relative w-full shrink-0">
                            <!-- Scrollable list -->
                            <div class="max-h-[150px] overflow-y-auto flex flex-col gap-1 pr-1"
                                @scroll="step.existingScrolled = $el.scrollTop > 0">
                                <template x-for="(r, idx) in step.relations" :key="idx">
                                    
                                    <div class="p-4 transition-all duration-200 ease-spring"
                                         :class="step.selectedRelation?.type === 'existing_' + idx ? 'text-amber-400 bg-amber-950 rounded-[2rem]' : 'text-blue-400 bg-blue-950 rounded-lg'"
                                         @click="step.selectedRelation = { type: 'existing_' + idx, relation: r.relation, mrc: r.medical_record_num };">
                                        
                                        <div class="flex-grow flex justify-center items-center">
                                            <span class="material-symbols-rounded transition-all duration-200 ease-spring"
                                                    :class="step.selectedRelation?.type === 'existing_' + idx ? 'w-6 mr-2' : 'w-0 -translate-x-12'">
                                                    check_circle
                                            </span>
                                            
                                            <div class="flex-grow">
                                                <div class="font-medium mr-auto" x-text="r.relation"></div>
                                                <template x-if="r.relation === '帳號本人' && !r.medical_record_num && step.selectedRelation?.type === 'existing_' + idx">
                                                    <div class="mt-5" @click.stop>
                                                      {{ text_input(
                                                          inputId='self.mrc',
                                                          inputType='text',
                                                          label='病歷號'
                                                      ) }}
                                                    </div>
                                                </template>
                                            </div>

                                             <div x-text="r.medical_record_num"></div>
                                        </div>

                                    </div>

                                </template>
                            </div>
                        </div>

                        <!-- NEW -->
                        <div class="w-full p-4 transition-all duration-200 ease-spring"
                            :class="step.selectedRelation?.type === 'new' ? 'bg-amber-950 rounded-[2rem]' : 'bg-blue-950 rounded-lg'"
                            @click="if(!step.selectedRelation || step.selectedRelation.type !== 'new') step.selectedRelation = step.draft.new;">

                            <!-- When NOT selected -->
                            <div x-show="step.selectedRelation?.type !== 'new'"
                                 class="flex font-bold text-blue-400 justify-center items-center">
                                新增
                            </div>

                            <!-- When selected -->
                            <div x-show="step.selectedRelation?.type === 'new'" class="flex items-center" @click.stop>
                                <!-- Icon -->
                                <div class="flex items-center justify-center">
                                    <span class="material-symbols-rounded text-amber-400">add_circle</span>
                                </div>
                                <!-- Two input fields -->
                                <div class="flex-grow flex flex-col space-y-5">
                                    {{ text_input(
                                        inputId='new.relation',
                                        inputType='text',
                                        label='稱呼'
                                    ) }}
                                    
                                    {{ text_input(
                                        inputId='new.mrc',
                                        inputType='text',
                                        label='病歷號'
                                    ) }}

                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Error msg display -->
                    <div x-show="step.pairSelectError" x-transition
                        class="text-red-500 text-sm font-medium text-center mt-2 shrink-0"
                        x-text="step.pairSelectError"></div>
                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmPatient()',
                    disableCond="!(step.selectedRelation
                        && ((step.selectedRelation.type.startsWith('existing') && step.selectedRelation.relation === '帳號本人' && !step.selectedRelation.mrc && step.draft.self.mrc.trim())
                        || (step.selectedRelation.type.startsWith('existing') && !(step.selectedRelation.relation === '帳號本人' && !step.selectedRelation.mrc))
                        || (step.selectedRelation.type === 'new' && step.draft.new.relation.trim() && step.draft.new.mrc.trim()))
                    )",
                    textColor='text-blue-950',
                    bgColor='bg-blue-400',
                    label='選擇病患'
                ) }}

            </div>
        </template>

    </div>
</template>

<!-- Completed: compact summary -->
<template x-if="step.completed && i !== currentStep">
    <div class="flex items-center gap-4">
        <span class="material-symbols-rounded text-blue-400">account_circle</span>
        <div class="font-medium text-blue-400 gap-2">
            <span class="text-amber-400" x-text="step.selectedRelation?.relation"></span>
            <span x-text="` ${step.selectedRelation?.mrc}`"></span>
        </div>
    </div>
</template>
