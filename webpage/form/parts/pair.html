<!--Current: expanded card-->
<template x-if="i === currentStep">
    <div class="flex flex-col h-full">

        <template x-if="!step.paired">
            <div class="line-wrapper">

                <!-- Header -->
                {{ card_header('請配對LINE帳號') }}

                <!-- Body -->
                <div class="flex-1 overflow-y-auto px-4 flex flex-col justify-center items-center w-full mb-6">
                    <div class="space-y-6 w-full">
                        <p class="text-slate-500 text-center font-medium">請輸入6位配對碼</p>
                        <div class="relative flex justify-between w-full px-2 mb-6" dir="ltr"
                            @click="$refs.pairInput.focus()">
                            <input x-ref="pairInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                                x-model="step.paringCode"
                                @input="step.paringCode = step.paringCode.replace(/[^0-9]/g, '')"
                                class="absolute inset-0 w-full h-full opacity-0 cursor-text z-10" />

                            <template x-for="idx in [0,1,2,3,4,5]" :key="idx">
                                <div class="w-10 h-14 sm:w-12 sm:h-16 flex items-center justify-center text-2xl font-bold text-gray-800 bg-transparent border-b-2 transition-colors"
                                    :class="step.paringCode.length === idx ? 'border-indigo-500' : 'border-slate-400'">
                                    <span x-text="step.paringCode[idx] || ''"></span>
                                </div>
                            </template>
                        </div>
                        <div x-show="step.error" x-transition class="text-red-500 text-sm font-medium text-center"
                            x-text="step.error"></div>
                    </div>
                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmPair()',
                    disableCond='step.currentStatus !== status.IDLE || step.paringCode.length < 6',
                    disableStyleCond='step.paringCode.length < 6',
                    textColor='text-blue-950',
                    bgColor='bg-blue-400',
                    label='配對'
                ) }}

            </div>
        </template>

        <template x-if="step.paired">
            <div class="patient-wrapper">

                <!-- Header -->
                {{ card_header('請選擇本次聊天病患') }}

                <!-- Body -->
                <div class="flex-1 overflow-y-auto px-4 relative min-h-0 flex flex-col w-full">
                    <!-- LINE and Patient Status display -->
                    <div class="flex items-center justify-between mt-2 mb-6 shrink-0 px-2 relative z-10">
                        <!-- LINE side -->
                        <div class="flex items-center space-x-2 w-1/2 min-w-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 30 30"
                                fill="#06C755" class="shrink-0">
                                <path
                                    d="M 6 4 C 4.895 4 4 4.895 4 6 L 4 24 C 4 25.105 4.895 26 6 26 L 24 26 C 25.105 26 26 25.105 26 24 L 26 6 C 26 4.895 25.105 4 24 4 L 6 4 z M 15.003906 7.6660156 C 19.720906 7.6660156 23.558594 10.780375 23.558594 14.609375 C 23.558594 16.142375 22.964609 17.523813 21.724609 18.882812 C 19.929609 20.948812 15.916906 23.464609 15.003906 23.849609 C 14.091906 24.233609 14.225719 23.604672 14.261719 23.388672 C 14.283719 23.260672 14.384766 22.65625 14.384766 22.65625 C 14.413766 22.43725 14.442469 22.099812 14.355469 21.882812 C 14.258469 21.645813 13.880563 21.520937 13.601562 21.460938 C 9.4895625 20.916937 6.4472656 18.041375 6.4472656 14.609375 C 6.4472656 10.781375 10.286906 7.6660156 15.003906 7.6660156 z M 12.626953 12.910156 C 12.375953 12.910156 12.171875 13.107656 12.171875 13.347656 L 12.171875 16.652344 C 12.171875 16.894344 12.375953 17.089844 12.626953 17.089844 C 12.877953 17.089844 13.082031 16.893344 13.082031 16.652344 L 13.082031 13.347656 C 13.082031 13.107656 12.877953 12.910156 12.626953 12.910156 z M 14.5625 12.910156 C 14.5175 12.910156 14.470781 12.915641 14.425781 12.931641 C 14.248781 12.991641 14.128906 13.157703 14.128906 13.345703 L 14.128906 16.650391 C 14.128906 16.892391 14.3225 17.089844 14.5625 17.089844 C 14.8025 17.089844 14.996094 16.890391 14.996094 16.650391 L 14.996094 14.605469 L 16.679688 16.914062 C 16.760687 17.024063 16.889391 17.089844 17.025391 17.089844 C 17.072391 17.089844 17.118109 17.082406 17.162109 17.066406 C 17.340109 17.006406 17.460938 16.840344 17.460938 16.652344 L 17.457031 16.652344 L 17.457031 13.347656 C 17.457031 13.107656 17.263391 12.910156 17.025391 12.910156 C 16.787391 12.910156 16.591797 13.107656 16.591797 13.347656 L 16.591797 15.392578 L 14.908203 13.085938 C 14.827203 12.975938 14.6985 12.910156 14.5625 12.910156 z M 18.929688 12.910156 C 18.678688 12.910156 18.474609 13.107656 18.474609 13.347656 L 18.474609 14.998047 L 18.474609 15 L 18.474609 16.650391 C 18.474609 16.892391 18.678687 17.089844 18.929688 17.089844 L 20.654297 17.089844 C 20.906297 17.089844 21.111328 16.892344 21.111328 16.652344 C 21.111328 16.412344 20.905297 16.216797 20.654297 16.216797 L 19.384766 16.216797 L 19.384766 15.435547 L 20.654297 15.435547 C 20.906297 15.435547 21.111328 15.24 21.111328 15 C 21.111328 14.758 20.905297 14.5625 20.654297 14.5625 L 19.384766 14.564453 L 19.384766 13.783203 L 20.654297 13.783203 C 20.906297 13.783203 21.111328 13.588656 21.111328 13.347656 C 21.111328 13.107656 20.905297 12.910156 20.654297 12.910156 L 18.929688 12.910156 z M 9.34375 12.912109 C 9.09275 12.912109 8.8886719 13.106656 8.8886719 13.347656 L 8.8886719 16.652344 C 8.8886719 16.894344 9.09275 17.089844 9.34375 17.089844 L 11.068359 17.089844 C 11.320359 17.089844 11.522438 16.893297 11.523438 16.654297 C 11.523437 16.414297 11.319359 16.21875 11.068359 16.21875 L 9.7988281 16.21875 L 9.7988281 13.347656 C 9.7988281 13.107656 9.59475 12.912109 9.34375 12.912109 z">
                                </path>
                            </svg>
                            <span class="font-bold text-gray-800 truncate text-sm" x-text="step.lineUname"></span>
                        </div>
                        <!-- Chain icon -->
                        <div
                            class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
                            <span class="material-symbols-outlined text-gray-400">link</span>
                        </div>
                        <!-- Patient side -->
                        <div class="flex items-center justify-end space-x-2 w-1/2 min-w-0">
                            <div class="flex flex-col text-right">
                                <template
                                    x-if="step.selectedRelation && (step.selectedRelation.relation || step.selectedRelation.type === 'self')">
                                    <span class="font-bold text-gray-800 text-sm"
                                        x-text="step.selectedRelation.type === 'self' ? '帳號本人' : step.selectedRelation.relation || '新增'"></span>
                                </template>
                                <template
                                    x-if="!(step.selectedRelation && (step.selectedRelation.relation || step.selectedRelation.type === 'self'))">
                                    <span class="font-bold text-gray-400 text-sm">???</span>
                                </template>
                                <template x-if="step.selectedRelation && step.selectedRelation.mrc">
                                    <span class="text-xs text-gray-500" x-text="step.selectedRelation.mrc"></span>
                                </template>
                                <template x-if="!(step.selectedRelation && step.selectedRelation.mrc)">
                                    <span class="text-xs text-gray-400">???</span>
                                </template>
                            </div>
                            <span
                                class="material-symbols-outlined text-[24px] text-gray-500 shrink-0">account_circle</span>
                        </div>
                    </div>

                    <!-- List -->
                    <div class="flex flex-col gap-3 min-h-0 w-full pb-1 overflow-y-auto pr-1">
                        <!-- SELF -->
                        <div x-show="!step.relations.some(r => r.relation === '帳號本人')"
                            class="transition-colors cursor-pointer p-4 shrink-0 border border-gray-200 rounded-xl"
                            :class="step.selectedRelation?.type === 'self' ? 'bg-emerald-500/10 border-emerald-500' : 'bg-gray-100 hover:bg-gray-200'"
                            @click="if(!step.selectedRelation || step.selectedRelation.type !== 'self') step.selectedRelation = step.draftInputs.self;">
                            <div class="flex items-center">
                                <!-- Icon -->
                                <div x-show="step.selectedRelation?.type === 'self'"
                                    class="mr-2 shrink-0 flex items-center justify-center">
                                    <span class="material-symbols-outlined text-emerald-500 text-[20px]">add</span>
                                </div>
                                <!-- Title & Input -->
                                <div class="flex-grow min-w-0">
                                    <div class="font-bold text-gray-800">帳號本人</div>
                                    <div x-show="step.selectedRelation?.type === 'self'" class="mt-2" @click.stop>
                                        <input type="text" x-model="step.draftInputs.self.mrc" placeholder="病歷號"
                                            class="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:border-emerald-500">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- EXISTING -->
                        <div x-show="step.relations.length > 0" class="relative w-full shrink-0">
                            <!-- Scrollable list -->
                            <div class="max-h-[170px] overflow-y-auto flex flex-col gap-3"
                                :class="step.relations.length >= 3 ? 'pb-6 pr-1' : ''"
                                @scroll="step.existingScrolled = $el.scrollTop > 0">
                                <template
                                    x-for="(r, idx) in [...step.relations].sort((a,b) => (a.relation === '帳號本人') ? -1 : (b.relation === '帳號本人') ? 1 : 0)"
                                    :key="idx">
                                    <div class="transition-colors cursor-pointer p-4 border border-gray-200 shrink-0"
                                        :class="[
                                              step.selectedRelation?.type === 'existing_' + idx ? 'bg-emerald-500/10 border-emerald-500' : 'bg-gray-100 hover:bg-gray-200', 'rounded-xl'
                                         ]"
                                        @click="step.selectedRelation = { type: 'existing_' + idx, relation: r.relation, mrc: r.medical_record_num };">
                                        <div class="flex items-center">
                                            <template x-if="step.selectedRelation?.type === 'existing_' + idx">
                                                <span
                                                    class="material-symbols-outlined text-emerald-500 mr-2 text-[20px]">check_small</span>
                                            </template>
                                            <div class="flex-grow flex justify-between items-center">
                                                <div class="font-bold text-gray-800" x-text="r.relation"></div>
                                                <div class="text-sm text-gray-500" x-text="r.medical_record_num"></div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- NEW -->
                        <div class="transition-colors cursor-pointer p-4 shrink-0 border border-gray-200 rounded-xl"
                            :class="step.selectedRelation?.type === 'new' ? 'bg-emerald-500/10 border-emerald-500' : 'bg-gray-100 hover:bg-gray-200'"
                            @click="if(!step.selectedRelation || step.selectedRelation.type !== 'new') step.selectedRelation = step.draftInputs.new;">

                            <!-- When NOT selected -->
                            <div x-show="step.selectedRelation?.type !== 'new'" class="flex items-center">
                                <div class="font-bold text-gray-800">新增</div>
                            </div>

                            <!-- When selected -->
                            <div x-show="step.selectedRelation?.type === 'new'" class="flex items-center" @click.stop>
                                <!-- Icon -->
                                <div class="mr-2 shrink-0 flex items-center justify-center">
                                    <span class="material-symbols-outlined text-emerald-500 text-[20px]">add</span>
                                </div>
                                <!-- Two input fields -->
                                <div class="flex-grow flex flex-col space-y-2 min-w-0">
                                    <input type="text" x-model="step.draftInputs.new.relation" placeholder="稱呼"
                                        class="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:border-emerald-500">
                                    <input type="text" x-model="step.draftInputs.new.mrc" placeholder="病歷號"
                                        class="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:border-emerald-500">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Error msg display -->
                    <div x-show="step.pairSelectError" x-transition
                        class="text-red-500 text-sm font-medium text-center mt-2 shrink-0"
                        x-text="step.pairSelectError"></div>
                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmPatient()',
                    disableCond="step.currentStatus !== status.IDLE
                        || !(step.selectedRelation
                        && ((step.selectedRelation.type === 'self' && step.draftInputs.self.mrc.trim())
                        || (step.selectedRelation.type === 'new' && step.draftInputs.new.relation.trim() && step.draftInputs.new.mrc.trim())
                        || step.selectedRelation.type.startsWith('existing'))
                    )",
                    disableStyleCond="!(step.selectedRelation
                        && ((step.selectedRelation.type === 'self' && step.draftInputs.self.mrc.trim())
                        || (step.selectedRelation.type === 'new' && step.draftInputs.new.relation.trim() && step.draftInputs.new.mrc.trim())
                        || step.selectedRelation.type.startsWith('existing'))
                    )",
                    textColor='text-blue-950',
                    bgColor='bg-blue-400',
                    label='選擇病患'
                ) }}

            </div>
        </template>

    </div>
</template>

<!-- Completed: compact summary -->
<template x-if="step.completed && i !== currentStep">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-blue-200 text-[20px] shrink-0">account_circle</span>
        <div class="text-sm text-blue-50">
            <span class="font-bold"
                x-text="step.selectedRelation?.type === 'self' ? '帳號本人' : step.selectedRelation?.relation"></span>
            <span x-text="` ${step.selectedRelation?.mrc}`" class="text-blue-200"></span>
        </div>
    </div>
</template>
