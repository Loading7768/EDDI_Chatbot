<!--Current: expanded card-->
<template x-if="i === currentStep">
    <div data-flip class="flex flex-col h-full animate-fade-in">

        <template x-if="!step.paired">
            <div class="line-wrapper">

                <!-- Header -->
                {{ card_header('請輸入配對碼') }}

                <!-- Body -->
                <div class="flex-1 overflow-y-auto items-center px-4 mt-16 mb-10">

                    <!-- Input Wrapper  -->
                    <div class="relative flex items-center justify-center px-4" dir="ltr"
                            x-data="{ focused: false }">

                        <!-- The Real Input (Hidden) -->
                        <input x-ref="pairInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                            x-model="step.pairingCode"
                            @input="step.pairingCode = step.pairingCode.replace(/[^0-9]/g, '')"
                            @mousedown.prevent="$el.focus()"
                            @keyup="$el.setSelectionRange($el.value.length, $el.value.length)"
                            @focus="focused = true; $nextTick(() => $el.setSelectionRange($el.value.length, $el.value.length))"
                            @blur="focused = false"
                            class="absolute w-full h-full opacity-0 select-none caret-transparent z-10"/>

                        <!-- Input Display -->
                        <template x-for="idx in [0,1,2,3,4,5]" :key="idx">
                            <div class="h-12 rounded-[2rem] flex justify-center items-center
                                    text-2xl font-extrabold text-slate-200
                                    transition-all duration-200 ease-spring"
                                :class="
                                    step.pairingCode.length === 6 ?
                                    'w-8 mx-0 rounded-none ' + (focused ? 'bg-amber-900' : 'bg-slate-700') + (idx === 0 ? ' rounded-s-2xl pl-2' : idx === 5 ? ' rounded-e-2xl pr-2' : ' w-6')
                                    : 'mx-auto ' + ((step.pairingCode.length === idx && focused) ? 'w-16 bg-amber-900 rounded-lg' : 'w-8 bg-slate-700')">
                                <span x-text="step.pairingCode[idx] || ''"></span>
                            </div>
                        </template>
                    </div>

                    <div x-show="step.error" class="text-red-500 font-medium text-center my-6" x-text="step.error"></div>

                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmPair()',
                    disableCond='step.pairingCode.length < 6',
                    textColor='text-blue-950',
                    bgColor='bg-blue-400',
                    label='配對'
                ) }}

            </div>
        </template>

        <template x-if="step.paired">
            <div class="patient-wrapper animate-fade-in">

                <!-- Header -->
                {{ card_header('請選擇本次聊天病患') }}

                <!-- Body -->
                <div class="flex-1 overflow-y-auto p-4 flex-col">

                    <!-- LINE and Patient Status display -->
                    <div class="flex relative items-center justify-between mb-10 px-5 py-4 bg-slate-700/50 rounded-2xl">
                        <!-- LINE side -->
                        <div class="flex items-center space-x-2 w-1/2 min-w-0 mr-4">
                            <div class="w-6 h-6 bg-slate-400 [mask-image:url('/assets/svg/line_icon.svg')]
                                [mask-size:contain] [mask-repeat:no-repeat] [mask-position:center]"></div>
                            <span class="font-bold text-slate-400 truncate text-sm" x-text="step.lineUname"></span>
                        </div>

                        <!-- Icon -->
                        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
                            <span class="material-symbols-rounded text-slate-400 select-none">sync_alt</span>
                        </div>

                        <!-- Patient side -->
                        <div class="flex items-center justify-end space-x-2 w-1/2 min-w-0 ml-4 text-amber-400 text-sm">
                            <div class="flex flex-col ml-2 text-right min-w-0 overflow-hidden">
                                <!-- Relation Name -->
                                <span class="font-bold truncate"
                                    x-text="step.selectedIdx === -1 ? step.draft.new.relation || '???'
                                        : step.savedRelations[step.selectedIdx].relation">
                                </span >

                                <!-- MRC Value -->
                                <span class="truncate" 
                                      x-text="step.selectedIdx === -1 ? step.draft.new.mrc || '???'
                                        : (step.selectedIdx === 0 && !step.hasSelf) ? step.draft.self.mrc || '???'
                                        : step.savedRelations[step.selectedIdx].medical_record_num">
                                </span>
                            </div>
                            
                            <span class="material-symbols-rounded select-none">account_circle</span>
                        </div>
                    </div>

                    <!-- SELF & EXISTING (Scrollable)-->
                    <div class="h-[150px] overflow-y-auto flex flex-col gap-1">

                        <!-- List Item -->
                        <template x-for="(r, idx) in step.savedRelations" :key="idx">
                            <div class="flex p-4 h-14 items-center justify-center transition-all duration-200 ease-spring"
                                 :class="step.selectedIdx !== idx ? 'text-blue-400 bg-blue-950 rounded-lg'
                                    : 'text-amber-400 bg-amber-950 rounded-[2rem] ' + ((idx === 0 && !step.hasSelf) ? 'h-24' : 'h-14')"
                                 @click="step.selectedIdx = idx;">
                                
                                <span class="material-symbols-rounded transition-all duration-200 ease-spring select-none"
                                      :class="step.selectedIdx === idx ? 'w-6 mr-2' : 'w-0 -translate-x-12'">
                                        check_circle
                                </span>
                                
                                <div class="flex-grow space-y-2">
                                    <span class="font-medium mr-auto"
                                          :class="{ 'text-sm' : idx === 0 && step.selectedIdx === 0 && !step.hasSelf }"
                                          x-text="r.relation"></span>
                                    <template x-if="idx === 0 && step.selectedIdx === 0 && !step.hasSelf">
                                        <div>
                                            {{ small_text_input(
                                                inputId='self.mrc',
                                                inputType='text',
                                                label='病歷號'
                                            ) }}
                                        </div>
                                    </template>
                                </div>

                                <div x-text="r.medical_record_num"></div>

                            </div>
                        </template>
                    </div>

                    <!-- NEW -->
                    <div class="w-full flex items-center px-4 mt-3 overflow-hidden transition-all duration-200 ease-spring"
                         :class="step.selectedIdx === -1 ? 'h-28 text-amber-400 bg-amber-950 rounded-[2rem]'
                            : 'h-14 text-blue-400 bg-blue-950 rounded-lg'"
                         @click="if(step.selectedIdx !== -1) step.selectedIdx = -1;">

                        <span class="material-symbols-rounded transition-all duration-200 ease-spring select-none"
                                :class="step.selectedIdx === -1 ? 'w-6 mr-2' : 'w-0 -translate-x-12'">
                                add_circle
                        </span>
                        <span x-show="step.selectedIdx !== -1" class="font-medium">新增病患</span>
                        
                        <div x-show="step.selectedIdx === -1" class="flex-grow flex-col space-y-2">
                            {{ small_text_input(
                                inputId='new.relation',
                                inputType='text',
                                label='稱呼'
                            ) }}
                            
                            {{ small_text_input(
                                inputId='new.mrc',
                                inputType='text',
                                label='病歷號'
                            ) }}
                        </div>


                    </div>

                <!-- Error msg display -->
                <div x-show="step.error" x-transition
                    class="text-red-500 text-sm font-medium text-center mt-2 shrink-0"
                    x-text="step.error"></div>
                </div>

                <!-- Footer -->
                {{ footer_button(
                    clickFunc='confirmPatient()',
                    disableCond="(
                        (step.selectedIdx === 0 && !step.hasSelf && !step.draft.self.mrc.trim())
                        || (step.selectedIdx === -1 && !(step.draft.new.relation.trim() && step.draft.new.mrc.trim()))
                    )",
                    textColor='text-blue-950',
                    bgColor='bg-blue-400',
                    label='選擇病患'
                ) }}

            </div>
        </template>

    </div>
</template>

<!-- Completed: compact summary -->
<template x-if="step.completed && i !== currentStep">
    <div class="flex items-center gap-4 animate-fade-in">

        <span class="material-symbols-rounded text-blue-400 select-none">account_circle</span>

        <div class="flex text-blue-400">
            <span class="mr-2 text-amber-400" x-text="step.selectedRelation?.relation"></span>
            <span x-text="step.selectedRelation?.mrc"></span>
        </div>

    </div>
</template>
