<!--Current: expanded card-->
<template x-if="i === currentStep">
    <div class="flex flex-col h-full">

        <!-- Header -->
        {{ card_header('請確認資料無誤') }}

        <!-- Body -->
        <div class="px-4 pb-2">

            <!-- Disclaimer -->
            <div class="flex flex-col items-center my-12 text-red-400">
                <span class="animate-pulse material-symbols-rounded text-6xl mb-2">info</span>
                <p class="font-medium">提交後必須至後台修改</p>
            </div>

            <!-- Date row -->
            <!-- <div class="flex justify-center items-center gap-3 text-xl text-slate-400 font-medium my-4">
                <span class="material-symbols-rounded text-blue-400">calendar_today</span>
                <p x-text="new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-')"></p>
            </div> -->

            <!-- Error msg -->
            <div x-show="step.error" x-transition
                class="mt-3 flex items-center gap-2 rounded-xl bg-red-50 border border-red-200 px-3 py-2.5 text-sm text-red-600">
                <span class="material-symbols-rounded text-[18px] shrink-0">error</span>
                <span x-text="step.error"></span>
            </div>

        </div>

        <!-- Footer -->
        {{ footer_button(
            clickFunc='submitForm()',
            disableCond='false',
            textColor='text-amber-950',
            bgColor='bg-amber-400',
            label='確認送出'
        ) }}

    </div>
</template>
